<form>
    <h1 id="titulo">Contacto</h1>
    <div class="mb-3">
        <label for="exampleInputEmail1" class="form-label">Email</label>
        <input type="email" class="form-control" id="exampleInputEmail1" placeholder="CorreoElectronico@gmail.com"
            aria-describedby="emailHelp">
        <div id="emailHelp" class="form-text">We'll never share your email with anyone else.</div>
    </div>
    <div class="mb-3">
        <label for="exampleInputPassword1" class="form-label">Movito</label>
        <select class="form-select" aria-label="Default select example">
            <option selected>Ayuda</option>
            <option value="1">Olvide mi contraseña</option>
            <option value="2">Quiero devolver un juego</option>
            <option value="3">Otro</option>
        </select>
    </div>
    <div class="mb-3">
        <label for="exampleInputPassword1" class="form-label">Describa su problema</label>
        <textarea class="form-control" aria-label="With textarea"></textarea>
    </div>
    <button type="submit" class="btn btn-primary">Enviar</button>
</form>
