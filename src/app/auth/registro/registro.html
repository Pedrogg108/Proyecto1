<div class="register-container">
  <div class="register-card">
    <h2 class="register-title">Crear Cuenta</h2>
    <p class="register-subtitle">Únete a nuestra comunidad hoy mismo</p>
    
    <form>
      <div class="mb-3 row">
        <label for="inputName" class="col-sm-4 col-form-label">Nombre</label>
        <div class="col-sm-8">
          <input type="text" class="form-control" id="inputName" placeholder="Tu nombre" required>
        </div>
      </div>

      <div class="mb-3 row">
        <label for="inputEmail" class="col-sm-4 col-form-label">Email</label>
        <div class="col-sm-8">
          <input type="email" class="form-control" id="inputEmail" placeholder="correo@ejemplo.com" required>
        </div>
      </div>

      <div class="mb-3 row">
        <label for="inputPassword" class="col-sm-4 col-form-label">Contraseña</label>
        <div class="col-sm-8">
          <input type="password" class="form-control" id="inputPassword" placeholder="Mínimo 8 caracteres" required>
        </div>
      </div>

      <div class="mb-3 row">
        <label for="confirmPassword" class="col-sm-4 col-form-label">Repetir</label>
        <div class="col-sm-8">
          <input type="password" class="form-control" id="confirmPassword" placeholder="Repite tu clave" required>
        </div>
      </div>

      <div class="terms-container">
        <input type="checkbox" id="terms" required>
        <label for="terms">Acepto los términos y condiciones</label>
      </div>

      <div class="d-grid mt-4">
        <button type="submit" class="btn-register">Registrarse ahora</button>
      </div>

      <div class="register-footer">
        <span>¿Ya tienes cuenta? </span>
        <a routerLink='/inicioSesion' role="button" class="login-link">Inicia sesión</a>
      </div>
    </form>
  </div>
</div>
